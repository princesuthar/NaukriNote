<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="nMarkGrad" x1="22" y1="26" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="100%" height="100%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)" />
  
  <!-- Clipboard Body -->
  <rect x="14" y="14" width="36" height="42" rx="4" fill="#ffffff" filter="url(#shadow)" />
  
  <!-- Clipboard Metal Clip -->
  <rect x="24" y="10" width="16" height="8" rx="4" fill="#cbd5e1" />
  <circle cx="32" cy="14" r="2" fill="#94a3b8" />
  
  <!-- Horizontal lines for the "Note" aspect -->
  <line x1="20" y1="24" x2="44" y2="24" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="32" x2="44" y2="32" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="40" x2="44" y2="40" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="48" x2="36" y2="48" stroke="#f1f5f9" stroke-width="2" stroke-linecap="round"/>

  <!-- The stylized 'N' + Checkmark -->
  <path d="M22 42 V26 L31 42 L44 24" stroke="url(#nMarkGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>